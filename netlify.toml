[build]
  command = "npm run build"
  publish = ".next"

[[headers]]
  for = "/liveeventoverlay/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/liveeventoverlay/_next/image"
  to = "/.netlify/images?url=:url&w=:width&q=:quality"
  status = 200

[[redirects]]
  from = "/_ipx/*"
  to = "/.netlify/images?url=:url&w=:width&q=:quality"
  status = 200

[[redirects]]
  from = "/liveeventoverlay/*"
  to = "/liveeventoverlay/:splat"
  status = 200
